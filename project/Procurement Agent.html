body {

::-webkit-scrollbar-thumb { background: var(--zinc-300); border-radius: 4px; }

/* Tweaks panel */
#tweaks-panel {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  background: white; border: 1px solid var(--zinc-200); border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12); padding: 16px 20px; width: 260px;
  display: none;
}
#tweaks-panel h4 { font-family:'Futura',sans-serif; font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--zinc-600); margin-bottom:14px; }
.tw-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.tw-label { font-size:13px; color:var(--zinc-700); }
.tw-toggle { width:36px; height:20px; border-radius:10px; border:none; cursor:pointer; position:relative; transition:background .2s; }
.tw-toggle.on { background:var(--green-600); }
.tw-toggle.off { background:var(--zinc-300); }
.tw-toggle::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; border-radius:50%; background:white; transition:transform .2s; }
.tw-toggle.on::after { transform:translateX(16px); }
.tw-select { font-size:12px; border:1px solid var(--zinc-200); border-radius:6px; padding:4px 8px; background:white; color:var(--zinc-800); cursor:pointer; }

    <button class="tw-toggle on" id="tw-feed" onclick="toggleTweak('feed',this)"></button>
  </div>
  <div class="tw-row">
    <span class="tw-label">コスト削減ハイライト</span>
    <button class="tw-toggle on" id="tw-savings" onclick="toggleTweak('savings',this)"></button>
  </div>
  <div class="tw-row">
    <span class="tw-label">サイドバー</span>
    <select class="tw-select" id="tw-sidebar" onchange="setSidebarStyle(this.value)">
      <option value="dark">ダーク</option>
      <option value="light">ライト</option>
    </select>
  </div>
</div>

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showFeed": true,
  "showSavings": true,
  "sidebarStyle": "dark"
}/*EDITMODE-END*/;
let tweaks = {...TWEAK_DEFAULTS};

function toggleTweak(key, btn) {
  const map = {feed:'showFeed', savings:'showSavings'};
  tweaks[map[key]] = !tweaks[map[key]];
  btn.className = 'tw-toggle ' + (tweaks[map[key]] ? 'on' : 'off');
  window.__tweakBus && window.__tweakBus(tweaks);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
}
function setSidebarStyle(val) {
  tweaks.sidebarStyle = val;
  window.__tweakBus && window.__tweakBus(tweaks);
  window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
}

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display='block';
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display='none';
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');
</script>

const ComparisonTable = ({ product, tweaks }) => {
  const [lotMode, setLotMode] = useState('min');
  const suppliers = product.tier1;
  const getPrice = (t1) => lotMode === 'min' ? t1.lots[0].price : t1.lots[t1.lots.length - 1].price;
  const getQty = (t1) => lotMode === 'min' ? t1.lots[0].qty : t1.lots[t1.lots.length - 1].qty;

  const ROWS = [
  { key: 'price', label: '製造単価', bold: true, raw: (t1) => getPrice(t1), fmt: (t1) => `¥${getPrice(t1)}` },
  { key: 'qty', label: '発注ロット', bold: false, raw: null, fmt: (t1) => `${getQty(t1).toLocaleString()}個` },
  { key: 'lead', label: '納品リードタイム', bold: false, raw: null, fmt: (t1) => t1.leadTime },
  { key: 'sep1', sep: true, label: 'コスト内訳' },
  { key: 'proc', label: '加工賃', bold: false, raw: (t1) => t1.pricing.processing, fmt: (t1) => `¥${t1.pricing.processing}` },
  { key: 'pkg', label: '包装資材費', bold: false, raw: (t1) => t1.pricing.packaging, fmt: (t1) => `¥${t1.pricing.packaging}` },
  { key: 'logi', label: '輸送費', bold: false, raw: (t1) => t1.pricing.logistics, fmt: (t1) => `¥${t1.pricing.logistics}` },
  { key: 'stor', label: '保管料', bold: false, raw: (t1) => t1.pricing.storage, fmt: (t1) => `¥${t1.pricing.storage}` },
  { key: 'sep2', sep: true, label: '合計' },
  { key: 'total', label: '合計コスト', bold: true, raw: (t1) => getPrice(t1), fmt: (t1) => `¥${getPrice(t1)}` }];


  const bestOf = (row) => {
    if (!row.raw) return null;
    const vals = suppliers.map(row.raw);
    return Math.min(...vals);
  };

  return (
    <div>
      {/* Lot switch */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, padding: '9px 14px', background: 'var(--zinc-50)', borderRadius: 8, border: '1px solid var(--zinc-200)' }}>
        <span style={{ fontSize: 12, color: 'var(--zinc-500)' }}>発注ロット:</span>
        <div style={{ display: 'flex', background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 6, overflow: 'hidden' }}>
          {[{ k: 'min', l: '最小ロット' }, { k: 'econ', l: '経済ロット' }].map((o) =>
          <button key={o.k} onClick={() => setLotMode(o.k)}
          style={{ padding: '5px 14px', border: 'none', background: lotMode === o.k ? 'var(--green-600)' : 'white', color: lotMode === o.k ? 'white' : 'var(--zinc-600)', fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', transition: 'background .15s' }}>
              {o.l}
            </button>
          )}
        </div>
        <span style={{ fontSize: 11, color: 'var(--zinc-400)' }}>
          {lotMode === 'min' ? `${suppliers[0]?.lots[0]?.qty.toLocaleString()}個〜` : `${suppliers[0]?.lots[suppliers[0].lots.length - 1]?.qty.toLocaleString()}個〜`}
        </span>
      </div>

      {/* Table */}
      <div style={{ border: '1px solid var(--zinc-200)', borderRadius: 10, overflow: 'hidden', marginBottom: 16 }}>
        {/* Header */}
        <div style={{ display: 'grid', gridTemplateColumns: `160px repeat(${suppliers.length},1fr)`, background: 'var(--zinc-50)', borderBottom: '2px solid var(--zinc-200)' }}>
          <div style={{ padding: '12px 14px', fontSize: 11, fontWeight: 600, color: 'var(--zinc-400)', letterSpacing: '.06em', textTransform: 'uppercase' }}>見積項目</div>
          {suppliers.map((t1) =>
          <div key={t1.id} style={{ padding: '12px 16px', borderLeft: '1px solid var(--zinc-200)' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--zinc-800)', marginBottom: 2 }}>{t1.name}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 11, color: 'var(--zinc-400)' }}>{t1.location}</span>
                <span style={{ fontSize: 11, color: 'var(--yellow)', fontWeight: 700 }}>★{t1.rating}</span>
              </div>
            </div>
          )}
        </div>
        {/* Rows */}
        {ROWS.map((row) => {
          if (row.sep) return (
            <div key={row.key} style={{ background: 'var(--zinc-100)', borderTop: '1px solid var(--zinc-200)', padding: '5px 14px', fontSize: 10, fontWeight: 700, color: 'var(--zinc-400)', letterSpacing: '.08em', textTransform: 'uppercase' }}>
              {row.label}
            </div>);

          const best = bestOf(row);
          return (
            <div key={row.key} style={{ display: 'grid', gridTemplateColumns: `160px repeat(${suppliers.length},1fr)`, borderTop: '1px solid var(--zinc-100)', background: row.bold ? 'var(--zinc-50)' : 'white' }}>
              <div style={{ padding: '10px 14px', fontSize: 13, fontWeight: row.bold ? 600 : 400, color: row.bold ? 'var(--zinc-800)' : 'var(--zinc-600)' }}>{row.label}</div>
              {suppliers.map((t1) => {
                const raw = row.raw ? row.raw(t1) : null;
                const isBest = best !== null && raw === best && suppliers.length > 1;
                return (
                  <div key={t1.id} style={{ padding: '10px 16px', borderLeft: '1px solid var(--zinc-100)', background: isBest && tweaks.showSavings ? 'var(--green-50)' : 'transparent', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontSize: 13, fontWeight: row.bold ? 700 : 400, color: isBest && tweaks.showSavings ? 'var(--green-700)' : 'var(--zinc-800)' }}>{row.fmt(t1)}</span>
                    {isBest && tweaks.showSavings &&
                    <Badge type="green" size="xs">最安</Badge>
                    }
                  </div>);

              })}
            </div>);

        })}
      </div>

      {/* Tier2 */}
      <SupplyChainTreeView product={product} tweaks={tweaks} />
    </div>);

};

                    {a.urgent && <Badge type="red" size="xs">要対応</Badge>}

                  <div style={{ display: 'flex', gap: 8 }}>
                    <button style={{ padding: '7px 16px', background: 'var(--green-600)', color: 'white', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>{a.actions[0]}</button>

                  </div>
                </div>
            )}
            </div>
          }

        </>}
      </div>
    </div>);

};

      {/* Left nav */}
      <div style={{ width: 240, borderRight: '1px solid var(--zinc-200)', background: 'white', overflowY: 'auto', flexShrink: 0, padding: '18px 12px' }}>
        <div style={{ padding: '4px 10px 14px', fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--zinc-400)' }}>設定</div>
        {SECTIONS.map((s) =>
        <button key={s.k} onClick={() => setSection(s.k)}
        style={{ width: '100%', textAlign: 'left', display: 'flex', gap: 10, padding: '11px 12px', borderRadius: 10, border: 'none', background: section === s.k ? 'var(--green-50)' : 'transparent', cursor: 'pointer', fontFamily: 'inherit', marginBottom: 3, alignItems: 'flex-start' }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: section === s.k ? 'var(--green-600)' : 'var(--zinc-100)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon d={s.icon} size={14} color={section === s.k ? 'white' : 'var(--zinc-500)'} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: section === s.k ? 600 : 500, color: section === s.k ? 'var(--green-700)' : 'var(--zinc-800)', marginBottom: 2 }}>{s.l}</div>
              <div style={{ fontSize: 11, color: 'var(--zinc-400)', lineHeight: 1.4 }}>{s.desc}</div>
            </div>
          </button>
        )}
      </div>

      {/* Main */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '28px 36px', position: 'relative' }}>
        {/* Toast */}
        {toast &&
        <div style={{ position: 'absolute', top: 20, right: 24, background: 'var(--zinc-900)', color: 'white', padding: '10px 16px', borderRadius: 8, fontSize: 13, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 8, zIndex: 100, boxShadow: '0 4px 12px rgba(0,0,0,.15)' }}>
            <Icon d={IC.check} size={14} color="var(--green-400)" />{toast}
          </div>
        }

        {section === 'agent' &&
        <div style={{ maxWidth: 720 }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--zinc-400)', marginBottom: 4 }}>AGENT SETTINGS</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.01em', marginBottom: 6 }}>エージェント設定</h2>
              <p style={{ fontSize: 13, color: 'var(--zinc-500)', lineHeight: 1.6 }}>AIエージェントがどこまで自律的に動くかを設定します。ここで許可されていないアクションは必ず承認を求めます。</p>
            </div>

            {/* Email connection */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 14 }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: 'rgba(255,214,1,.18)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon d={IC.zap} size={16} color="#C79900" />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>メール連携</div>
                  <p style={{ fontSize: 12, color: 'var(--zinc-500)', lineHeight: 1.6 }}>メールアカウントを連携すると、エージェントが仕入先への見積依頼・督促・交渉メールを代行します。</p>
                </div>
                {emailConnected && <Badge type="green" size="sm">連携済み</Badge>}
              </div>
              {!emailConnected ?
            <div style={{ display: 'flex', gap: 10 }}>
                  {[{ l: 'Gmailで連携', c: '#EA4335' }, { l: 'Outlookで連携', c: '#0078D4' }].map((m) =>
              <button key={m.l} onClick={() => setEmailConnected(true)}
              style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 20px', background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 10, fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', transition: 'all .15s' }}
              onMouseEnter={(e) => {e.currentTarget.style.borderColor = m.c;e.currentTarget.style.background = m.c + '08';}}
              onMouseLeave={(e) => {e.currentTarget.style.borderColor = 'var(--zinc-200)';e.currentTarget.style.background = 'white';}}>
                      <span style={{ width: 12, height: 12, borderRadius: '50%', background: m.c, flexShrink: 0 }} />{m.l}
                    </button>
              )}
                </div> :

            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', background: 'var(--green-50)', border: '1px solid var(--green-200)', borderRadius: 10 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Icon d={IC.check} size={15} color="var(--green-600)" />
                    <div>
                      <div style={{ fontSize: 13, color: 'var(--green-700)', fontWeight: 600 }}>procurement@crft.co.jp</div>
                      <div style={{ fontSize: 11, color: 'var(--zinc-500)' }}>Gmail で連携中 · エージェントの自律実行が有効です</div>
                    </div>
                  </div>
                  <button onClick={() => setEmailConnected(false)} style={{ fontSize: 12, color: 'var(--zinc-500)', background: 'white', border: '1px solid var(--zinc-200)', padding: '5px 12px', borderRadius: 6, cursor: 'pointer', fontFamily: 'inherit' }}>連携解除</button>
                </div>
            }
            </div>

            {/* Permissions */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', marginBottom: 14, opacity: emailConnected ? 1 : .55 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>自律実行の許可</div>
              <p style={{ fontSize: 12, color: 'var(--zinc-500)', marginBottom: 16, lineHeight: 1.6 }}>OFFのアクションは「次の動き」タブに承認待ちとして表示されます。</p>
              {AGENT_PERMS_FULL.map((p, i) =>
            <div key={p.k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '13px 0', borderTop: i === 0 ? 'none' : '1px solid var(--zinc-100)' }}>
                  <div style={{ flex: 1, marginRight: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--zinc-800)', marginBottom: 2 }}>{p.l}</div>
                    <div style={{ fontSize: 11, color: 'var(--zinc-400)' }}>{p.desc}</div>
                  </div>
                  <button onClick={() => emailConnected && togglePerm(p.k)} style={{ width: 44, height: 24, borderRadius: 12, border: 'none', background: perms[p.k] ? 'var(--green-600)' : 'var(--zinc-300)', cursor: emailConnected ? 'pointer' : 'not-allowed', position: 'relative', transition: 'background .2s', flexShrink: 0 }}>
                    <span style={{ position: 'absolute', top: 3, left: perms[p.k] ? 23 : 3, width: 18, height: 18, borderRadius: '50%', background: 'white', transition: 'left .2s', display: 'block', boxShadow: '0 1px 2px rgba(0,0,0,.15)' }} />
                  </button>
                </div>
            )}
            </div>

            {/* Threshold */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', opacity: emailConnected ? 1 : .55 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>自動承認の閾値</div>
              <p style={{ fontSize: 12, color: 'var(--zinc-500)', marginBottom: 18, lineHeight: 1.6 }}>この金額以下の価格差異はエージェントが自動承認します。超過する場合は「次の動き」で確認を求めます。</p>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <input type="range" min={0} max={100000} step={1000} value={threshold} onChange={(e) => setThreshold(Number(e.target.value))} disabled={!emailConnected} style={{ flex: 1, accentColor: 'var(--green-600)' }} />
                <div style={{ padding: '8px 16px', background: 'var(--green-50)', border: '1px solid var(--green-200)', borderRadius: 8, fontSize: 16, fontWeight: 700, minWidth: 110, textAlign: 'center', color: 'var(--green-700)' }}>¥{threshold.toLocaleString()}</div>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--zinc-400)', marginTop: 6 }}>
                <span>¥0 — すべて確認する</span><span>¥100,000 — 大きく自動化</span>
              </div>
            </div>
          </div>
        }

        {section === 'template' &&
        <div style={{ maxWidth: 960 }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--zinc-400)', marginBottom: 4 }}>EMAIL TEMPLATES</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.01em', marginBottom: 6 }}>メールテンプレート</h2>
              <p style={{ fontSize: 13, color: 'var(--zinc-500)', lineHeight: 1.6 }}>エージェントが仕入先へ送るメール文面を編集できます。<code style={{ background: 'var(--zinc-100)', padding: '1px 6px', borderRadius: 4, fontSize: 12, fontFamily: 'ui-monospace,monospace' }}>{'{{変数}}'}</code> は送信時に自動で置き換わります。</p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 16 }}>
              {/* Template list */}
              <div>
                {Object.entries(templates).map(([k, t]) =>
              <button key={k} onClick={() => {
                if (isDirty && !confirm('編集中の変更は破棄されます。よろしいですか?')) return;
                setActiveTpl(k);
              }}
              style={{ width: '100%', textAlign: 'left', padding: '12px 14px', borderRadius: 10, border: `1px solid ${activeTpl === k ? 'var(--green-600)' : 'var(--zinc-200)'}`, background: activeTpl === k ? 'var(--green-50)' : 'white', cursor: 'pointer', fontFamily: 'inherit', marginBottom: 8, transition: 'all .15s' }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: activeTpl === k ? 'var(--green-700)' : 'var(--zinc-800)', marginBottom: 3 }}>{t.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--zinc-500)', lineHeight: 1.4 }}>{t.desc}</div>
                  </button>
              )}
              </div>

              {/* Editor */}
              <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600 }}>{currentTpl.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--zinc-500)' }}>{currentTpl.desc}</div>
                  </div>
                  {isDirty && <Badge type="yellow" size="sm">未保存の変更</Badge>}
                </div>

                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>件名</label>
                  <input value={editingSubject} onChange={(e) => setDraft({ subject: e.target.value, body: editingBody })}
                style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--zinc-200)', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', outline: 'none', transition: 'border-color .15s' }}
                onFocus={(e) => e.currentTarget.style.borderColor = 'var(--green-600)'}
                onBlur={(e) => e.currentTarget.style.borderColor = 'var(--zinc-200)'} />
                </div>

                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>本文</label>
                  <textarea value={editingBody} onChange={(e) => setDraft({ subject: editingSubject, body: e.target.value })}
                style={{ width: '100%', minHeight: 260, padding: '12px 14px', border: '1px solid var(--zinc-200)', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', lineHeight: 1.7, transition: 'border-color .15s' }}
                onFocus={(e) => e.currentTarget.style.borderColor = 'var(--green-600)'}
                onBlur={(e) => e.currentTarget.style.borderColor = 'var(--zinc-200)'} />
                </div>

                {/* Token chips */}
                <div style={{ marginBottom: 18 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>クリックで変数を挿入</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {currentTpl.tokens.map((tok) =>
                  <button key={tok} onClick={() => insertToken(tok)}
                  style={{ padding: '5px 11px', background: 'var(--zinc-50)', border: '1px solid var(--zinc-200)', borderRadius: 6, fontSize: 11, fontFamily: 'ui-monospace,monospace', color: 'var(--zinc-700)', cursor: 'pointer', transition: 'all .15s' }}
                  onMouseEnter={(e) => {e.currentTarget.style.background = 'var(--green-50)';e.currentTarget.style.borderColor = 'var(--green-600)';e.currentTarget.style.color = 'var(--green-700)';}}
                  onMouseLeave={(e) => {e.currentTarget.style.background = 'var(--zinc-50)';e.currentTarget.style.borderColor = 'var(--zinc-200)';e.currentTarget.style.color = 'var(--zinc-700)';}}>
                        {'{{' + tok + '}}'}
                      </button>
                  )}
                  </div>
                </div>

                {/* Actions */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 16, borderTop: '1px solid var(--zinc-100)' }}>
                  <button onClick={resetTpl} style={{ fontSize: 12, color: 'var(--zinc-500)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit', textDecoration: 'underline' }}>初期テンプレートに戻す</button>
                  <div style={{ display: 'flex', gap: 8 }}>
                    {isDirty &&
                  <button onClick={() => setDraft(null)} style={{ padding: '8px 16px', background: 'white', color: 'var(--zinc-600)', border: '1px solid var(--zinc-200)', borderRadius: 8, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>キャンセル</button>
                  }
                    <button onClick={saveTpl} disabled={!isDirty}
                  style={{ padding: '8px 18px', background: isDirty ? 'var(--green-600)' : 'var(--zinc-200)', color: 'white', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: isDirty ? 'pointer' : 'not-allowed', fontFamily: 'inherit' }}>
                      保存する
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        }

        {section === 'guide' &&
        <div style={{ maxWidth: 860 }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--zinc-400)', marginBottom: 4 }}>GUIDELINES</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.01em', marginBottom: 6 }}>ガイドライン</h2>
              <p style={{ fontSize: 13, color: 'var(--zinc-500)', lineHeight: 1.6 }}>エージェントが自律的に判断する際の基準です。各商品・仕入先の評価、アラート発生、交渉優先度の根拠として使われます。</p>
            </div>

            {/* Cost rate */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 18 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--green-50)', border: '1px solid var(--green-200)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon d={IC.bar} size={14} color="var(--green-600)" />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>原価率の目標・許容幅</div>
                  <p style={{ fontSize: 12, color: 'var(--zinc-500)', lineHeight: 1.5 }}>全体の目標原価率と、どこまで上振れを許容するかを設定します。超過するとエージェントが警告・再交渉を提案します。</p>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <GuideSlider label="目標原価率" value={guide.costRate} setValue={(v) => setG('costRate', v)} min={20} max={70} step={1} suffix="%" color="var(--green-600)" />
                <GuideSlider label="許容幅 (±)" value={guide.costRateTolerance} setValue={(v) => setG('costRateTolerance', v)} min={0} max={10} step={0.5} suffix="pp" color="var(--warning)" />
              </div>

              <div style={{ marginTop: 14, padding: '12px 14px', background: 'var(--green-50)', border: '1px solid var(--green-200)', borderRadius: 8, fontSize: 12, color: 'var(--green-700)', lineHeight: 1.6 }}>
                <strong>許容レンジ:</strong> {(guide.costRate - guide.costRateTolerance).toFixed(1)}% 〜 {(guide.costRate + guide.costRateTolerance).toFixed(1)}% <span style={{ color: 'var(--zinc-500)' }}>超過するとアラートが発生します</span>
              </div>
            </div>

            {/* Monitoring */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 18 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--warning-light)', border: '1px solid #fcd34d', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon d={IC.alert} size={14} color="var(--warning)" />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>監視基準</div>
                  <p style={{ fontSize: 12, color: 'var(--zinc-500)', lineHeight: 1.5 }}>これらを超えるとエージェントが自動でアラートを発報します。</p>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <GuideSlider label="納期遅延のアラート閾値" value={guide.alertLeadTime} setValue={(v) => setG('alertLeadTime', v)} min={1} max={14} step={1} suffix="日" color="var(--error)" />
                <GuideSlider label="価格上昇のアラート閾値" value={guide.alertPriceRise} setValue={(v) => setG('alertPriceRise', v)} min={1} max={20} step={0.5} suffix="%" color="var(--error)" />
              </div>
            </div>

            {/* Procurement standards */}
            <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, padding: '22px 26px', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 18 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--info-light)', border: '1px solid #bfdbfe', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon d={IC.check} size={14} color="var(--info)" />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>調達基準</div>
                  <p style={{ fontSize: 12, color: 'var(--zinc-500)', lineHeight: 1.5 }}>新規仕入先を評価・採用する際の基準です。</p>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
                <GuideSlider label="最低取引先数" value={guide.minSuppliers} setValue={(v) => setG('minSuppliers', v)} min={1} max={10} step={1} suffix="社" color="var(--info)" hint="1商品あたり確保する仕入先の下限" />
                <GuideSlider label="希望支払サイト" value={guide.paymentTerm} setValue={(v) => setG('paymentTerm', v)} min={15} max={120} step={15} suffix="日" color="var(--info)" hint="月末締め翌月末払い=60日" />
              </div>

              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>必須要件</div>
                <GuideCheck label="ISO認証 (ISO 9001など) の取得" checked={guide.mustHaveISO} onChange={(v) => setG('mustHaveISO', v)} />
                <GuideCheck label="HACCP認証の取得" checked={guide.mustHaveHACCP} onChange={(v) => setG('mustHaveHACCP', v)} />
                <GuideCheck label="国内生産を優先する" checked={guide.preferDomestic} onChange={(v) => setG('preferDomestic', v)} />
              </div>

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>除外したい地域・事業者</label>
                <input value={guide.excludeRegions} onChange={(e) => setG('excludeRegions', e.target.value)} placeholder="例: 特定地域、競合A社のグループ企業 など"
              style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--zinc-200)', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', outline: 'none' }}
              onFocus={(e) => e.currentTarget.style.borderColor = 'var(--green-600)'}
              onBlur={(e) => e.currentTarget.style.borderColor = 'var(--zinc-200)'} />
              </div>

              <div>
                <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: 6 }}>自由記述メモ</label>
                <textarea value={guide.notes} onChange={(e) => setG('notes', e.target.value)} placeholder="例: 新商品開発の際は既存Tier1優先。売上¥100万以下の案件はTier2含めて比較など、エージェントに伝えたい運用ルールを記載"
              style={{ width: '100%', minHeight: 100, padding: '12px 14px', border: '1px solid var(--zinc-200)', borderRadius: 8, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', lineHeight: 1.6 }}
              onFocus={(e) => e.currentTarget.style.borderColor = 'var(--green-600)'}
              onBlur={(e) => e.currentTarget.style.borderColor = 'var(--zinc-200)'} />
              </div>
            </div>

            <div style={{ padding: '14px 18px', background: 'var(--zinc-50)', borderRadius: 10, fontSize: 12, color: 'var(--zinc-500)', lineHeight: 1.6, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <Icon d={IC.check} size={14} color="var(--green-600)" />
              <div>ガイドラインは自動保存されます。変更は次回のエージェント稼働時から反映されます。</div>
            </div>
          </div>
        }
      </div>
    </div>);

};

// Reusable controls for settings
const GuideSlider = ({ label, value, setValue, min, max, step, suffix, color, hint }) =>
<div>

const ScreenOrders = () => {
  const [filter, setFilter] = useState('all');
  const [expanded, setExpanded] = useState(null);

  const tabs = [{ k: 'all', l: '全件' }, { k: 'delayed', l: '遅延リスク' }, { k: 'discrepancy', l: '要確認' }, { k: 'completed', l: '完了' }];
  const filtered = ORDERS.filter((o) => {
    if (filter === 'all') return true;
    if (filter === 'delayed') return o.status === 'delayed';
    if (filter === 'discrepancy') return o.status === 'negotiating' || o.status === 'qty_mismatch';
    if (filter === 'completed') return o.status === 'completed';
    return true;
  });

  const statusInfo = {
    on_track: { label: '順調', type: 'green' },
    negotiating: { label: '価格確認中', type: 'orange' },
    delayed: { label: '遅延', type: 'red' },
    completed: { label: '完了', type: 'neutral' },
    qty_mismatch: { label: '数量差異', type: 'orange' }
  };

  return (
    <div style={{ padding: '28px 32px', overflowY: 'auto', height: '100%' }}>
      <div style={{ marginBottom: 20 }}>

          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px', background: 'var(--yellow-light)', border: '1px solid #FFD601', borderRadius: 8, fontSize: 12, color: 'var(--zinc-700)' }}>
              <Icon d={IC.bot} size={13} color="var(--yellow)" />
              <span>AI自動解析 <b>稼働中</b></span>
            </div>
          </div>
        </div>
      </div>

      {/* Filter tabs */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20, borderBottom: '1px solid var(--zinc-200)', paddingBottom: 0 }}>
        {tabs.map((t) =>
        <button key={t.k} onClick={() => setFilter(t.k)}
        style={{ padding: '8px 16px', border: 'none', background: 'transparent', cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: filter === t.k ? 600 : 400, color: filter === t.k ? 'var(--green-600)' : 'var(--zinc-500)', borderBottom: `2px solid ${filter === t.k ? 'var(--green-600)' : 'transparent'}`, marginBottom: -1, transition: 'all .15s' }}>
            {t.l}
            {t.k === 'delayed' && <span style={{ marginLeft: 4, fontSize: 11, color: 'var(--error)' }}>({ORDERS.filter((o) => o.status === 'delayed').length})</span>}
            {t.k === 'discrepancy' && <span style={{ marginLeft: 4, fontSize: 11, color: 'var(--warning)' }}>({ORDERS.filter((o) => o.status === 'negotiating' || o.status === 'qty_mismatch').length})</span>}
          </button>
        )}
      </div>

      {/* Table */}
      <div style={{ background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr 130px 90px 90px 100px 100px', padding: '10px 16px', background: 'var(--zinc-50)', borderBottom: '1px solid var(--zinc-200)', fontSize: 11, fontWeight: 600, color: 'var(--zinc-500)', letterSpacing: '.04em' }}>
          <span>発注番号</span><span>商品 / 仕入先</span><span>サプライヤー</span><span>発注日</span><span>納期</span><span>ステータス</span><span>AI分析</span>

          const si = statusInfo[o.status] || statusInfo.on_track;
          const isExp = expanded === o.id;
          return (
            <div key={o.id}>
              <div onClick={() => setExpanded(isExp ? null : o.id)}
              style={{ display: 'grid', gridTemplateColumns: '160px 1fr 130px 90px 90px 100px 100px', padding: '13px 16px', borderBottom: '1px solid var(--zinc-100)', cursor: 'pointer', background: isExp ? 'var(--zinc-50)' : 'white', transition: 'background .15s' }}

              onMouseLeave={(e) => {if (!isExp) e.currentTarget.style.background = 'white';}}>
                <span style={{ fontSize: 12, fontFamily: 'Futura,sans-serif', color: 'var(--zinc-500)', letterSpacing: '.03em' }}>{o.id.slice(-10)}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--zinc-800)' }}>{o.product}</div>
                  <div style={{ fontSize: 11, color: 'var(--zinc-400)' }}>{o.qty.toLocaleString()}{o.unit}</div>
                </div>
                <span style={{ fontSize: 12, color: 'var(--zinc-600)' }}>{o.supplier}</span>
                <span style={{ fontSize: 12, color: 'var(--zinc-500)' }}>{o.ordered.slice(5)}</span>
                <span style={{ fontSize: 12, color: o.status === 'delayed' ? 'var(--error)' : 'var(--zinc-500)', fontWeight: o.status === 'delayed' ? 600 : 400 }}>{o.delivery.slice(5)}</span>
                <span><Badge type={si.type} size="xs">{si.label}</Badge></span>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  {o.discrepancy && <Icon d={o.discrepancy.severity === 'error' ? IC.alert : IC.clock} size={12} color={o.discrepancy.severity === 'error' ? 'var(--error)' : 'var(--warning)'} />}
                  <span style={{ fontSize: 12, color: o.discrepancy ? 'var(--warning)' : 'var(--zinc-400)' }}>{o.analysis}</span>
                </div>
              </div>
              {isExp && o.discrepancy &&
              <div style={{ padding: '14px 24px 14px 52px', background: o.discrepancy.severity === 'error' ? '#fff5f5' : '#fffbeb', borderBottom: '1px solid var(--zinc-200)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                  <Icon d={IC.alert} size={14} color={o.discrepancy.severity === 'error' ? 'var(--error)' : 'var(--warning)'} style={{ flexShrink: 0, marginTop: 2 }} />
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: o.discrepancy.severity === 'error' ? 'var(--error)' : 'var(--warning)', marginBottom: 4 }}>
                      {o.discrepancy.type === 'delay' ? '納期遅延アラート' : o.discrepancy.type === 'price' ? '価格差異アラート' : '数量差異アラート'}
                    </div>
                    <p style={{ fontSize: 13, color: 'var(--zinc-700)', lineHeight: 1.5 }}>{o.discrepancy.detail}</p>
                  </div>
                </div>
              }
            </div>);

        })}
      </div>
    </div>);

};

const HideFromSelector = ({ selected, onChange }) => {
  const [input, setInput] = useState('');

  const addItem = (name) => {if (name.trim() && !selected.includes(name.trim())) onChange([...selected, name.trim()]);setInput('');setOpen(false);};
  const remove = (name) => onChange(selected.filter((x) => x !== name));

  return (
    <div style={{ marginTop: 8, marginBottom: 4 }}>
      {/* Selected tags */}

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>

              {m}
              <button onClick={() => remove(m)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--zinc-400)', padding: 0, lineHeight: 1, fontSize: 14 }}>×</button>
            </span>
        )}
        </div>
      }
      {/* Input + dropdown */}
      <div style={{ position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'center', border: '1px solid var(--zinc-200)', borderRadius: 8, background: 'white', overflow: 'visible' }}>

          <input
            value={input} placeholder="製造業者を選択または入力..."
            onChange={(e) => {setInput(e.target.value);setOpen(true);}}

            onKeyDown={(e) => {if (e.key === 'Enter' && input.trim()) addItem(input);if (e.key === 'Escape') setOpen(false);}}
            style={{ flex: 1, padding: '8px 10px', border: 'none', outline: 'none', fontSize: 13, fontFamily: 'inherit', background: 'transparent' }} />
          
          {input &&
          <button onClick={() => addItem(input)} style={{ padding: '4px 10px', margin: '3px 4px', background: 'var(--green-600)', color: 'white', border: 'none', borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', flexShrink: 0 }}>追加</button>

        <div style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 8, boxShadow: '0 4px 12px rgba(0,0,0,.1)', zIndex: 50, maxHeight: 180, overflowY: 'auto' }}>

          onMouseLeave={(e) => e.currentTarget.style.background = 'white'}>
                {m}

              <Icon d={IC.chevL} size={14} color="var(--zinc-500)" />前のステップ
            </button>
            <button onClick={() => setStep((s) => s + 1)} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '9px 20px', background: 'var(--green-600)', color: 'white', border: 'none', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
              {step < 3 ? '次のステップ' : '選択した領域で検索'}<Icon d={IC.arrow} size={14} color="white" />
            </button>
          </div>
        }
      </div>
    </div>);

};

// ─── MAIN APP ─────────────────────────────────────────────────────
const NAV = [
{ id: 'dashboard', label: 'ダッシュボード', icon: IC.dash },
{ id: 'agents', label: 'エージェント管理', icon: IC.bot },
{ id: 'orders', label: '発注管理', icon: IC.package },
{ id: 'alerts', label: 'アラート', icon: IC.bell, badge: 3 }];


const WORKSPACES = [
{ id: 'ws1', name: 'for Crafts, Inc.', role: '管理者', color: '#185C37' },
{ id: 'ws2', name: 'プレミアム食品チーム', role: 'メンバー', color: '#0078D4' },
{ id: 'ws3', name: '新商品開発チーム', role: 'メンバー', color: '#7C3AED' }];


const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('crft_screen') || 'dashboard');
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS });
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [wsId, setWsId] = useState('ws1');
  const [wsOpen, setWsOpen] = useState(false);
  const ws = WORKSPACES.find((w) => w.id === wsId) || WORKSPACES[0];

  useEffect(() => {
    localStorage.setItem('crft_screen', screen);
  }, [screen]);

  useEffect(() => {
    window.__tweakBus = (t) => setTweaks({ ...t });
    return () => {window.__tweakBus = null;};
  }, []);

  useEffect(() => {
    if (!wsOpen) return;
    const close = () => setWsOpen(false);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [wsOpen]);

  const sidebarBg = tweaks.sidebarStyle === 'light' ? 'white' : '#0d1f14';
  const sidebarFg = tweaks.sidebarStyle === 'light' ? 'var(--zinc-600)' : 'rgba(255,255,255,0.65)';
  const sidebarActiveBg = tweaks.sidebarStyle === 'light' ? 'var(--green-50)' : 'rgba(255,255,255,0.1)';
  const sidebarActiveFg = tweaks.sidebarStyle === 'light' ? 'var(--green-700)' : 'white';
  const sidebarBorder = tweaks.sidebarStyle === 'light' ? '1px solid var(--zinc-200)' : 'none';

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      {/* Sidebar */}
      <div style={{ width: sidebarCollapsed ? 64 : 220, flexShrink: 0, background: sidebarBg, border: sidebarBorder, borderRight: tweaks.sidebarStyle === 'light' ? '1px solid var(--zinc-200)' : 'none', display: 'flex', flexDirection: 'column', transition: `width .3s var(--ease)`, overflow: 'hidden' }}>
        {/* Logo */}
        <div style={{ padding: '18px 16px', display: 'flex', alignItems: 'center', justifyContent: sidebarCollapsed ? 'center' : 'space-between', borderBottom: tweaks.sidebarStyle === 'light' ? '1px solid var(--zinc-100)' : '1px solid rgba(255,255,255,0.06)', flexShrink: 0 }}>
          {!sidebarCollapsed &&
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <img src="assets/CRFT_logo_typo_white.svg" style={{ height: 20, filter: tweaks.sidebarStyle === 'light' ? 'invert(1) sepia(1) saturate(5) hue-rotate(90deg)' : 'none' }} alt="CRFT" />
            </div>
          }
          {sidebarCollapsed &&
          <img src="assets/CRFT_logo.svg" style={{ height: 24 }} alt="CRFT" />
          }
          {!sidebarCollapsed &&
          <button onClick={() => setSidebarCollapsed(true)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: sidebarFg, padding: 4, borderRadius: 4, display: 'flex' }}>
              <Icon d={IC.chevL} size={14} color={sidebarFg} />
            </button>
          }
        </div>

        {/* Workspace switcher */}
        {!sidebarCollapsed &&
        <div style={{ margin: '10px 10px 4px', position: 'relative' }}>
            <button onClick={() => setWsOpen((o) => !o)}
          style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', background: 'rgba(255,255,255,.07)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 8, cursor: 'pointer', transition: 'all .15s' }}
          onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,.12)'}
          onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,.07)'}>
              <span style={{ width: 22, height: 22, borderRadius: 6, background: ws.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 11, fontWeight: 700, color: 'white' }}>{ws.name[0]}</span>
              <div style={{ flex: 1, minWidth: 0, textAlign: 'left' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'white', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ws.name}</div>
                <div style={{ fontSize: 10, color: 'rgba(255,255,255,.4)' }}>{ws.role}</div>
              </div>
              <Icon d={IC.chevR} size={12} color="rgba(255,255,255,.4)" />
            </button>
            {wsOpen &&
          <div style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, background: 'white', border: '1px solid var(--zinc-200)', borderRadius: 10, boxShadow: '0 8px 24px rgba(0,0,0,.15)', zIndex: 100, overflow: 'hidden' }}>
                <div style={{ padding: '8px 12px 4px', fontSize: 10, fontWeight: 700, color: 'var(--zinc-400)', letterSpacing: '.08em', textTransform: 'uppercase' }}>ワークスペース</div>
                {WORKSPACES.map((w) =>
            <div key={w.id} onClick={() => {setWsId(w.id);setWsOpen(false);}}
            style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 12px', cursor: 'pointer', background: wsId === w.id ? 'var(--green-50)' : 'white' }}
            onMouseEnter={(e) => {if (wsId !== w.id) e.currentTarget.style.background = 'var(--zinc-50)';}}
            onMouseLeave={(e) => {if (wsId !== w.id) e.currentTarget.style.background = 'white';}}>
                    <span style={{ width: 24, height: 24, borderRadius: 6, background: w.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 11, fontWeight: 700, color: 'white' }}>{w.name[0]}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--zinc-800)' }}>{w.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--zinc-400)' }}>{w.role}</div>
                    </div>
                    {wsId === w.id && <Icon d={IC.check} size={13} color="var(--green-600)" />}
                  </div>
            )}
                <div style={{ borderTop: '1px solid var(--zinc-100)', padding: '8px 12px' }}>
                  <button style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 6, padding: '7px 8px', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, color: 'var(--zinc-500)', borderRadius: 6 }}
              onMouseEnter={(e) => e.currentTarget.style.background = 'var(--zinc-50)'}
              onMouseLeave={(e) => e.currentTarget.style.background = 'none'}>
                    <Icon d={IC.plus} size={13} color="var(--zinc-400)" />新しいワークスペースを作成
                  </button>
                </div>
              </div>
          }
          </div>
        }

        {/* Agent status pill */}
        {!sidebarCollapsed &&
        <div style={{ margin: '12px 12px 4px', padding: '8px 12px', background: 'rgba(255,214,1,0.12)', border: '1px solid rgba(255,214,1,0.25)', borderRadius: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#FFD601', display: 'inline-block', flexShrink: 0 }} />
            <span style={{ fontSize: 11, color: '#FFD601', fontWeight: 600 }}>{PRODUCTS.length}体のエージェント稼働中</span>
          </div>
        }

        {/* Nav */}
        <nav style={{ flex: 1, padding: '8px 8px', overflowY: 'auto' }}>
          {NAV.map((n) =>
          <button key={n.id} onClick={() => setScreen(n.id)}
          style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: sidebarCollapsed ? '10px' : '9px 12px', borderRadius: 8, border: 'none', background: n.accent && screen !== n.id ? 'rgba(255,214,1,0.12)' : screen === n.id ? sidebarActiveBg : 'transparent', color: n.accent ? '#FFD601' : screen === n.id ? sidebarActiveFg : sidebarFg, cursor: 'pointer', fontFamily: 'Noto Sans JP,sans-serif', fontSize: 13, fontWeight: screen === n.id || n.accent ? 600 : 400, marginBottom: 2, transition: 'all .15s', justifyContent: sidebarCollapsed ? 'center' : 'flex-start', position: 'relative' }}>
              <Icon d={n.icon} size={16} color={screen === n.id ? sidebarActiveFg : sidebarFg} />
              {!sidebarCollapsed && <span>{n.label}</span>}
              {n.badge && !sidebarCollapsed &&
            <span style={{ marginLeft: 'auto', background: 'var(--error)', color: 'white', borderRadius: 10, fontSize: 10, fontWeight: 700, padding: '1px 6px' }}>{n.badge}</span>
            }
              {n.badge && sidebarCollapsed &&
            <span style={{ position: 'absolute', top: 6, right: 6, width: 8, height: 8, background: 'var(--error)', borderRadius: '50%' }} />
            }
            </button>
          )}
        </nav>

        {/* Collapse toggle */}
        {sidebarCollapsed &&
        <div style={{ padding: '12px', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
            <button onClick={() => setSidebarCollapsed(false)} style={{ width: '100%', background: 'transparent', border: 'none', cursor: 'pointer', color: sidebarFg, display: 'flex', justifyContent: 'center', padding: 6 }}>
              <Icon d={IC.chevR} size={14} color={sidebarFg} />
            </button>
          </div>
        }

        {/* Bottom */}
        {!sidebarCollapsed &&
        <div style={{ padding: '8px 8px 12px', borderTop: tweaks.sidebarStyle === 'light' ? '1px solid var(--zinc-100)' : '1px solid rgba(255,255,255,0.06)' }}>
            {/* New case button */}
            <button onClick={() => setScreen('new')}
          style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 8, padding: '9px 12px', borderRadius: 8, border: '1px solid rgba(255,214,1,.3)', background: screen === 'new' ? 'rgba(255,214,1,.15)' : 'rgba(255,214,1,.08)', color: '#FFD601', cursor: 'pointer', fontFamily: 'Noto Sans JP,sans-serif', fontSize: 13, fontWeight: 600, marginBottom: 4, transition: 'all .15s' }}
          onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,214,1,.18)'}
          onMouseLeave={(e) => e.currentTarget.style.background = screen === 'new' ? 'rgba(255,214,1,.15)' : 'rgba(255,214,1,.08)'}>
              <Icon d={IC.plus} size={15} color="#FFD601" />新規作成
            </button>
            <button onClick={() => setScreen('settings')}
          style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 8, border: 'none', background: 'transparent', color: sidebarFg, cursor: 'pointer', fontFamily: 'Noto Sans JP,sans-serif', fontSize: 13 }}>
              <Icon d={IC.settings} size={16} color={sidebarFg} /><span>設定</span>
            </button>
          </div>
        }
      </div>

      {/* Main content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Header */}
        <div style={{ height: 52, background: 'white', borderBottom: '1px solid var(--zinc-200)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--green-600)' }}>CRFT</span>
            <span style={{ color: 'var(--zinc-300)' }}>·</span>
            <span style={{ fontSize: 13, color: 'var(--zinc-500)' }}>調達AIエージェント</span>
            <span style={{ color: 'var(--zinc-200)' }}>·</span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: 'var(--zinc-500)' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: ws.color, display: 'inline-block' }} />{ws.name}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ fontSize: 12, color: 'var(--zinc-400)' }}>2026年4月20日</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 10px', background: 'var(--green-50)', borderRadius: 6, border: '1px solid var(--green-200)' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--success)', display: 'inline-block' }} />
              <span style={{ fontSize: 11, color: 'var(--green-700)', fontWeight: 600 }}>24/7 稼働中</span>
            </div>
          </div>
        </div>

        {/* Screen */}
        <div style={{ flex: 1, overflow: 'hidden' }}>
          {screen === 'dashboard' && <ScreenDashboard tweaks={tweaks} />}
          {screen === 'new' && <ScreenNew />}
          {screen === 'agents' && <ScreenAgents tweaks={tweaks} goToSettings={() => setScreen('settings')} />}
          {screen === 'cost' && <ScreenAgents tweaks={tweaks} goToSettings={() => setScreen('settings')} />}
          {screen === 'orders' && <ScreenOrders />}
          {screen === 'settings' && <ScreenSettings />}
          {screen === 'alerts' &&
          <div style={{ padding: '28px 32px', overflowY: 'auto', height: '100%' }}>
              <div style={{ fontSize: 11, fontFamily: 'Futura,sans-serif', fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--zinc-400)', marginBottom: 4 }}>ALERTS</div>
              <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20 }}>アラート一覧</h2>
              {ALERTS.map((a) =>
            <div key={a.id} style={{ background: 'white', border: `1px solid ${a.type === 'error' ? '#fca5a5' : '#fcd34d'}`, borderRadius: 12, padding: '18px 22px', marginBottom: 12, display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: a.type === 'error' ? 'var(--error-light)' : 'var(--warning-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <Icon d={IC.alert} size={18} color={a.type === 'error' ? 'var(--error)' : 'var(--warning)'} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                      <span style={{ fontWeight: 600, fontSize: 14 }}>{a.product}</span>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                        <span style={{ fontSize: 11, color: 'var(--zinc-400)' }}>{a.time}</span>
                        <Badge type={a.type === 'error' ? 'red' : 'orange'}>{a.action}</Badge>
                      </div>
                    </div>
                    <p style={{ fontSize: 13, color: 'var(--zinc-600)', lineHeight: 1.5 }}>{a.msg}</p>
                  </div>
                </div>
            )}
            </div>
          }
        </div>
      </div>
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</body>
</html>
